<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>True or False Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f4f4f4;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    #result {
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>True or False Game</h2>
  <p id="question">The Earth is flat.</p>

  <button onclick="checkAnswer(true)">True</button>
  <button onclick="checkAnswer(false)">False</button>

  <p id="result"></p>
</div>

<script>
  // Question data
  const question = {
    text: "The Earth is flat.",
    answer: false
  };

  function checkAnswer(userAnswer) {
    const result = document.getElementById("result");

    if (userAnswer === question.answer) {
      result.textContent = "Correct!";
      result.style.color = "green";
    } else {
      result.textContent = "Wrong!";
      result.style.color = "red";
    }
  }
</script>

</body>
</html>
